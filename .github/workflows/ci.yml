name: CI

# Gate on typecheck + unit tests. (Not `next build` — that needs Supabase/QStash
# secrets CI doesn't have. Lint is intentionally omitted; ESLint is unconfigured.)
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test
