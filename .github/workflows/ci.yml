name: CI

# Gate on typecheck + lint + unit tests. (Not `next build` — that needs
# Supabase/QStash secrets CI doesn't have.)
on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token: CI only reads the repo. Fork PRs already get a
# read-only token, but this pins it for same-repo runs too — a compromised
# dependency postinstall script can't push or write with it.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Vitest (route + component)
        run: npm run test:unit
